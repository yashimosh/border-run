<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Border Run — experiment</title>
    <meta name="description" content="A border, a bike, a load. Vertical slice." />
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0b0c; color: #e8e6e1; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      #stage { position: fixed; inset: 0; }
      #stage canvas { display: block; width: 100%; height: 100%; }

      .hud { position: fixed; padding: 14px 16px; font-size: 12px; line-height: 1.45; letter-spacing: 0.02em; pointer-events: none; }
      .hud.tl { top: 0; left: 0; }
      .hud.tr { top: 0; right: 0; text-align: right; }
      .hud.bl { bottom: 0; left: 0; }
      .hud .k { opacity: 0.55; }
      .hud .v { opacity: 0.95; }
      .hud kbd { font: inherit; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); padding: 1px 5px; border-radius: 3px; }

      #title {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        text-align: center; max-width: 520px; padding: 0 24px;
        transition: opacity 600ms ease;
      }
      #title h1 { font: 500 22px/1.2 ui-monospace, monospace; letter-spacing: 0.04em; margin-bottom: 10px; }
      #title p  { font-size: 13px; opacity: 0.65; margin-bottom: 22px; }
      #title button {
        font: inherit; background: transparent; color: inherit;
        border: 1px solid rgba(232,230,225,0.3); padding: 10px 18px; cursor: pointer;
        letter-spacing: 0.08em; text-transform: uppercase; font-size: 11px;
      }
      #title button:hover { border-color: #e8e6e1; }
      #title.hidden { opacity: 0; pointer-events: none; }

      #event {
        position: fixed; left: 50%; top: 32px; transform: translateX(-50%);
        padding: 8px 14px; border: 1px solid rgba(232,230,225,0.25);
        font-size: 12px; letter-spacing: 0.05em; opacity: 0;
        transition: opacity 300ms ease;
      }
      #event.show { opacity: 1; }

      .colophon { position: fixed; bottom: 12px; right: 14px; font-size: 10px; opacity: 0.4; }
      .colophon a { color: inherit; }

      .picker { display: flex; gap: 12px; justify-content: center; margin-bottom: 16px; }
      .picker label {
        cursor: pointer; padding: 12px 14px; min-width: 130px;
        border: 1px solid rgba(232,230,225,0.18); text-align: left;
        font-size: 11px; line-height: 1.4; transition: border-color 200ms;
      }
      .picker label:hover { border-color: rgba(232,230,225,0.5); }
      .picker input { display: none; }
      .picker input:checked + .card { border-color: #e8e6e1; }
      .picker .card { display: block; padding: 0; border: 1px solid transparent; transition: border-color 200ms; }
      .picker .card .name { display: block; opacity: 0.95; letter-spacing: 0.04em; }
      .picker .card .meta { display: block; opacity: 0.5; font-size: 10px; margin-top: 4px; }
    </style>
  </head>
  <body>
    <div id="stage"></div>

    <div class="hud tl">
      <div><span class="k">slice</span> <span class="v">v0.2</span></div>
      <div><span class="k">scene</span> <span class="v">border-01 / qandil ridge</span></div>
      <div><span class="k">vehicle</span> <span class="v" id="hud-vehicle">—</span></div>
    </div>

    <div class="hud tr">
      <div><span class="k">speed</span> <span class="v" id="hud-speed">0</span> <span class="k">km/h</span></div>
      <div><span class="k">load</span> <span class="v" id="hud-load">4/4</span> <span class="k">secured</span></div>
      <div><span class="k">heading</span> <span class="v" id="hud-heading">—</span></div>
    </div>

    <div class="hud bl">
      <div><kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> drive · <kbd>Shift</kbd> handbrake · <kbd>Space</kbd> brake · <kbd>R</kbd> reset</div>
    </div>

    <div id="title">
      <h1>Border Run</h1>
      <p>Pick a truck. The line doesn't move; you do.</p>
      <div class="picker">
        <label>
          <input type="radio" name="vehicle-choice" id="vehicle-choice" value="fj40" checked />
          <span class="card">
            <span class="name">FJ40 — '79</span>
            <span class="meta">short wheelbase · agile · jerry cans on the roof</span>
          </span>
        </label>
        <label>
          <input type="radio" name="vehicle-choice" value="hj75" />
          <span class="card">
            <span class="name">HJ75 — '85</span>
            <span class="meta">long pickup · heavier · cargo in the bed</span>
          </span>
        </label>
      </div>
      <button id="start">Drive</button>
    </div>

    <div id="event">— crossing —</div>

    <div class="colophon">slice v0.1</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
